<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FFD400">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="BILLA trenažér">
  <title>BILLA pokladní trenažér</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">

  <!-- Písmo BILLA (náhrada Mulish, z Google Fonts). Pokud není dostupné
       (offline / nenačteno), elegantně degraduje na systémové písmo.
       Ikony jsou vložená SVG (js/icons.js) – fungují vždy, i offline. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main id="app" class="app"></main>

  <!-- vrstvy pro zpětnou vazbu a modaly -->
  <div id="overlay" class="overlay"></div>
  <div id="overlay-stack"></div>
  <div id="toast" class="toast"></div>

  <!-- pořadí načítání je důležité -->
  <script src="js/money.js"></script>
  <script src="js/data.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/games/change.js"></script>
  <script src="js/games/rounding.js"></script>
  <script src="js/games/till.js"></script>
  <script src="js/games/scenarios.js"></script>
  <script src="js/games/pos.js"></script>

</body>
</html>
